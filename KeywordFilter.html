<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關鍵字篩選器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 15px; background-color: #f0f2f5; margin: 0; }
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h2 { color: #333; border-left: 5px solid #007bff; padding-left: 10px; margin: 0 0 15px 0; font-size: 1.5em; }
        
        .intro {
            background-color: #e7f3ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #0c5460;
            line-height: 1.5;
        }

        .control-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            flex-wrap: wrap;
        }
        
        #keywordInput { 
            flex: 1;
            min-width: 200px;
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            outline: none;
        }

        /* 按鈕樣式優化 */
        .btn {
            padding: 0 15px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            height: 45px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .extract-btn { background-color: #007bff; }
        .copy-btn { background-color: #6f42c1; } /* 紫色 */
        .download-btn { background-color: #28a745; }
        .clear-btn { background-color: #ff4d4f; }

        #displayArea { 
            width: 100%; 
            height: 60vh; 
            border: 1px solid #eee; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-y: auto; 
            background: #fafafa; 
            white-space: pre-wrap; 
            word-wrap: break-word;
            color: #444; 
            font-size: 16px; 
            outline: none;
            box-sizing: border-box;
        }

        mark { 
            background-color: #ffcf00; 
            color: #000;              
            font-weight: bold; 
            padding: 0 2px;
            border-radius: 2px;
        }
        
        /* 複製成功的浮動提示 */
        #copyToast {
            visibility: hidden;
            min-width: 150px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 10px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
        }

        #copyToast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 600px) {
            .control-group { display: grid; grid-template-columns: 1fr 1fr; }
            #keywordInput { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>關鍵字篩選器</h2>

    <div class="intro">
        <strong>💡 操作流程：</strong><br>
        1. 貼上全文 → 2. 輸入關鍵字 → 3. 點擊<strong>「提取名單」</strong> → 4. 點擊<strong>「一鍵複製」</strong>直接貼到 Excel 或記事本。
    </div>
    
    <div class="control-group">
        <input type="text" id="keywordInput" placeholder="輸入關鍵字 (如：我會參加直播)">
        <button class="btn extract-btn" onclick="extractNames()">提取名單</button>
        <button class="btn copy-btn" onclick="copyToClipboard()">一鍵複製</button>
        <button class="btn download-btn" onclick="downloadTXT()">下載檔案</button>
        <button class="btn clear-btn" onclick="clearContent()">清空</button>
    </div>

    <div id="displayArea" contenteditable="true" placeholder="請在此貼上文章內容..."></div>
    
    <p class="footer-hint">
        ※ 提取名單後，若要恢復全文請點「清空」重新貼上。
    </p>
</div>

<div id="copyToast">已複製到剪貼簿！</div>

<script>
    const keywordInput = document.getElementById('keywordInput');
    const displayArea = document.getElementById('displayArea');
    const toast = document.getElementById('copyToast');
    let rawContent = "";

    // 監聽內容輸入
    displayArea.addEventListener('input', function() {
        if (keywordInput.value === "") {
            rawContent = displayArea.innerText;
        }
    });

    // 監聽關鍵字高亮
    keywordInput.addEventListener('input', function() {
        const keyword = this.value;
        if (!rawContent && displayArea.innerText !== "") {
            rawContent = displayArea.innerText;
        }
        if (!keyword) {
            displayArea.innerText = rawContent;
            return;
        }
        highlight(keyword);
    });

    function highlight(key) {
        const safeKey = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${safeKey})`, 'gi');
        const highlightedText = rawContent.replace(regex, '<mark>$1</mark>');
        displayArea.innerHTML = highlightedText;
    }

    // --- 提取邏輯 ---
    function extractNames() {
        const keyword = keywordInput.value.trim();
        if (!keyword) {
            alert("請先輸入關鍵字！");
            return;
        }

        const content = rawContent || displayArea.innerText;
        const lines = content.split('\n').map(line => line.trim());
        const nameList = [];

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(keyword)) {
                let foundName = "";
                for (let j = i - 1; j >= 0; j--) {
                    if (lines[j] !== "") {
                        foundName = lines[j];
                        break; 
                    }
                }
                if (foundName && !nameList.includes(foundName)) {
                    nameList.push(foundName);
                }
            }
        }

        if (nameList.length === 0) {
            alert("找不到對應的名稱，請檢查關鍵字！");
            return;
        }

        const resultText = nameList.join('\n');
        displayArea.innerText = resultText;
        rawContent = resultText;
        keywordInput.value = ""; 
        showToast(`成功提取 ${nameList.length} 位名稱！`);
    }

    // --- 一鍵複製功能 ---
    async function copyToClipboard() {
        const text = displayArea.innerText;
        if (!text.trim()) {
            alert("目前沒有內容可以複製！");
            return;
        }

        try {
            await navigator.clipboard.writeText(text);
            showToast("已複製到剪貼簿！");
        } catch (err) {
            // 備用方案 (針對較舊的瀏覽器)
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("已複製到剪貼簿！");
        }
    }

    // 顯示提示訊息
    function showToast(msg) {
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2000);
    }

    function downloadTXT() {
        const textToSave = displayArea.innerText;
        if (!textToSave.trim()) {
            alert("目前沒有內容可以下載！");
            return;
        }
        const blob = new Blob([textToSave], { type: "text/plain;charset=utf-8" });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        const timestamp = new Date().toISOString().slice(0, 10);
        link.download = `名單備份_${timestamp}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.URL.revokeObjectURL(url);
    }

    function clearContent() {
        if (confirm("確定要清空所有內容嗎？")) {
            keywordInput.value = "";
            displayArea.innerHTML = "";
            rawContent = "";
        }
    }
</script>

</body>
</html>
