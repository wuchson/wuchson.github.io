<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>長度單位換算器</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #f0f2f5; 
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            box-sizing: border-box; 
        }
        h2 { text-align: center; margin: 0 0 10px 0; color: #1a1a1a; }
        .intro { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        
        .section-title { 
            grid-column: 1 / -1; 
            font-size: 12px; 
            color: #999; 
            text-transform: uppercase; 
            margin-top: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .unit-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }
        @media (min-width: 480px) { .unit-grid { grid-template-columns: 1fr 1fr; } }

        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #555; display: flex; justify-content: space-between; }
        label span { color: #aaa; font-weight: normal; }
        
        input { 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            font-size: 16px; 
            width: 100%; 
            box-sizing: border-box; 
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: #4CAF50; outline: none; background-color: #f9fff9; border-width: 2px; }
        
        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #bbb; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>長度換算 Length Converter</h2>
    <p class="intro">支援公制與英制單位，輸入數值即可自動同步換算。<br>Instant Metric & Imperial conversion.</p>

    <div class="unit-grid">
        <div class="section-title">公制單位 Metric System</div>
        <div class="input-group">
            <label>公里 <span>Kilometers (km)</span></label>
            <input type="number" id="km" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>公尺 <span>Meters (m)</span></label>
            <input type="number" id="m" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>公分 <span>Centimeters (cm)</span></label>
            <input type="number" id="cm" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>公釐 <span>Millimeters (mm)</span></label>
            <input type="number" id="mm" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>奈米 <span>Nanometers (nm)</span></label>
            <input type="number" id="nm" placeholder="0" oninput="convert(this)">
        </div>

        <div class="section-title">英制單位 Imperial System</div>
        <div class="input-group">
            <label>英里 <span>Miles (mi)</span></label>
            <input type="number" id="mi" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>碼 <span>Yards (yd)</span></label>
            <input type="number" id="yd" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>英尺 <span>Feet (ft)</span></label>
            <input type="number" id="ft" placeholder="0" oninput="convert(this)">
        </div>
        <div class="input-group">
            <label>英寸 <span>Inches (in)</span></label>
            <input type="number" id="in" placeholder="0" oninput="convert(this)">
        </div>

        <div class="section-title">其他 Others</div>
        <div class="input-group">
            <label>海里 <span>Nautical Miles (nmi)</span></label>
            <input type="number" id="nmi" placeholder="0" oninput="convert(this)">
        </div>
    </div>

    <div class="footer">© 單位換算工具 Unit Conversion Tool</div>
</div>

<script>
    const factors = {
        km: 1000,
        m: 1,
        cm: 0.01,
        mm: 0.001,
        nm: 1e-9,
        mi: 1609.344,
        yd: 0.9144,
        ft: 0.3048,
        in: 0.0254,
        nmi: 1852
    };

    function convert(input) {
        const val = input.value;
        const id = input.id;

        if (val === "") {
            Object.keys(factors).forEach(key => {
                if (key !== id) document.getElementById(key).value = "";
            });
            return;
        }

        const value = parseFloat(val);
        const meters = value * factors[id];

        Object.keys(factors).forEach(key => {
            if (key !== id) {
                const result = meters / factors[key];
                // 使用 toPrecision(10) 處理精度，Number() 去除多餘的 0
                document.getElementById(key).value = Number(result.toPrecision(10));
            }
        });
    }
</script>

</body>
</html>
