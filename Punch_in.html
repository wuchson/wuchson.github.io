<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打卡系統</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--primary:#0f172a;--accent:#3b82f6;--danger:#ef4444;--success:#10b981;--bg:#f8fafc;}
body{font-family:'PingFang TC',sans-serif;background:var(--bg);margin:0;color:#334155;}
nav{background:white;padding:.8rem;display:flex;justify-content:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);position:sticky;top:0}
nav button{padding:10px 15px;border:none;border-radius:8px;background:#f1f5f9;font-weight:bold}
nav button.active{background:var(--primary);color:white}
.container{max-width:1000px;margin:10px auto;padding:0 12px}
.page{display:none}
.page.active{display:block}
.card{background:white;padding:22px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.05);margin-bottom:15px}
h2{font-size:1.1rem;margin-top:0;color:var(--primary);border-left:4px solid var(--accent);padding-left:10px}
input,select{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:10px}
button{width:100%;padding:14px;border:none;border-radius:10px;font-weight:bold;margin-bottom:8px}
.primary-btn{background:var(--primary);color:white}
.accent-btn{background:var(--accent);color:white}
.secondary-btn{background:#e2e8f0}
.danger-btn{background:#fee2e2;color:#ef4444;font-size:13px;padding:8px}
.status-toggle{display:flex;gap:10px;margin-bottom:15px}
.status-btn{flex:1;padding:15px;border:2px solid #e2e8f0;background:white;border-radius:12px}
.status-btn.active-in{border-color:var(--success);background:#ecfdf5}
.status-btn.active-out{border-color:var(--danger);background:#fef2f2}
.list-table{width:100%;border-collapse:collapse;font-size:14px}
.list-table th{padding:10px;border-bottom:2px solid #f1f5f9;color:#94a3b8}
.list-table td{padding:12px;border-bottom:1px solid #f1f5f9}
.stat-badge{background:#eff6ff;color:#1e40af;padding:4px 8px;border-radius:6px;font-weight:bold}
</style>
</head>

<body>

<nav>
<button id="nav-scan" class="active" onclick="showPage('scan')">📸 掃描打卡</button>
<button id="nav-make" onclick="showPage('make')">👤 員工管理</button>
</nav>

<div class="container">

<div id="page-scan" class="page active">
<div class="card">

<h2>打卡狀態</h2>

<div class="status-toggle">
<button id="btn-in" class="status-btn active-in" onclick="setStatus('上班')">☀ 上班</button>
<button id="btn-out" class="status-btn" onclick="setStatus('下班')">🌙 下班</button>
</div>

<div id="reader"></div>

<div id="scan-feedback" style="margin-top:15px;padding:15px;text-align:center;background:#f1f5f9;border-radius:12px;font-weight:bold">
請掃描員工 QR Code
</div>

<button id="continue-btn" style="display:none" class="accent-btn" onclick="startScanner()">🔄 繼續掃描</button>

</div>

<div class="card">
<h2>今日紀錄</h2>

<table class="list-table">
<thead>
<tr>
<th>姓名</th>
<th>時間</th>
<th>狀態</th>
</tr>
</thead>

<tbody id="log-body"></tbody>

</table>
</div>
</div>

<div id="page-make" class="page">
<div class="card">

<h2 id="period-display">本期工時統計</h2>

<table class="list-table">

<thead>
<tr>
<th>姓名</th>
<th>部門</th>
<th>工時</th>
</tr>
</thead>

<tbody id="stat-table-body"></tbody>

</table>

</div>
</div>

</div>

<script>

let logs = JSON.parse(localStorage.getItem('hr_logs_v20')) || [];
let staffDb = JSON.parse(localStorage.getItem('staff_db_v20')) || [];
let cycleDay = 1;

let scanner;
let currentStatus="上班";

function setStatus(s){
currentStatus=s;
document.getElementById('btn-in').classList.toggle('active-in',s==="上班");
document.getElementById('btn-out').classList.toggle('active-out',s==="下班");
}

function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById('page-'+p).classList.add('active');
if(p==="scan")startScanner();else stopScanner();
if(p==="make")calculateStats();
renderLogs();
}

async function startScanner(){

document.getElementById('continue-btn').style.display="none";

if(!scanner)scanner=new Html5Qrcode("reader");

try{

await scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(id)=>{

const staff=staffDb.find(s=>s.id===id);
const name=staff?staff.name:id;

logs.unshift({
uid:Date.now(),
name,
time:Date.now(),
type:currentStatus
});

localStorage.setItem('hr_logs_v20',JSON.stringify(logs));

renderLogs();

const f=document.getElementById('scan-feedback');

f.innerText=`✅ ${name} ${currentStatus}成功`;

document.getElementById('continue-btn').style.display="block";

stopScanner();

});

}catch(e){}

}

function stopScanner(){
if(scanner&&scanner.isScanning)scanner.stop();
}

function renderLogs(){

document.getElementById('log-body').innerHTML=
logs.slice(0,15).map(l=>`

<tr>
<td>${l.name}</td>
<td>${new Date(l.time).toLocaleTimeString()}</td>
<td style="color:${l.type==='上班'?'#10b981':'#ef4444'};font-weight:bold">
${l.type}
</td>
</tr>

`).join('');

}

function calculateStats(){

const stats={};

staffDb.forEach(s=>{
stats[s.id]={name:s.name,dept:s.dept||"-",normal:0,overtime:0,lastIn:null};
});

const sorted=[...logs].sort((a,b)=>a.time-b.time);

sorted.forEach(l=>{

const staff=staffDb.find(s=>s.name===l.name);
if(!staff)return;

const stat=stats[staff.id];

if(l.type==="上班"){
stat.lastIn=l.time;
}

if(l.type==="下班"&&stat.lastIn){

const hours=(l.time-stat.lastIn)/3600000;

if(hours<=8){

stat.normal+=hours;

}else{

stat.normal+=8;
stat.overtime+=hours-8;

}

stat.lastIn=null;

}

});

document.getElementById('stat-table-body').innerHTML=
Object.values(stats).map(s=>{

const total=s.normal+s.overtime;

return`
<tr>
<td><b>${s.name}</b></td>
<td>${s.dept}</td>
<td>

<span class="stat-badge">${total.toFixed(1)} 小時</span>

<br>

<small>
正常:${s.normal.toFixed(1)} / 加班:${s.overtime.toFixed(1)}
</small>

</td>
</tr>
`;

}).join('');

}

window.onload=()=>{
showPage('scan');
};

</script>

</body>
</html>
