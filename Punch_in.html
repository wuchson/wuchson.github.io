<script>
    async function drawBadge() {
        const canvas = document.getElementById('badge-canvas');
        const ctx = canvas.getContext('2d');
        const comp = document.getElementById('m-company').value || "卓越企業集團";
        const id = (document.getElementById('m-id').value || "ID-000").toUpperCase();
        const name = document.getElementById('m-name').value || "員工姓名";
        const shift = document.getElementById('m-shift-select').value || "班別";
        const dept = document.getElementById('m-dept').value || "部門名稱";
        const photoFile = document.getElementById('m-photo').files[0];

        // 畫布基礎設定
        const W = 1080;
        const H = 1728;
        const CX = W / 2;

        // 1. 背景漸層
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#1e293b');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // 2. 公司名稱
        ctx.fillStyle = "#3b82f6"; ctx.textAlign = "center";
        ctx.font = "bold 60px Arial"; ctx.fillText(comp, CX, 180);

        // 3. 照片框
        const photoY = 650;
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 20;
        ctx.beginPath(); ctx.arc(CX, photoY, 310, 0, Math.PI*2); ctx.stroke();
        
        if(photoFile) {
            const img = await new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = URL.createObjectURL(photoFile); });
            ctx.save(); ctx.beginPath(); ctx.arc(CX, photoY, 300, 0, Math.PI*2); ctx.clip();
            const ratio = Math.max(600/img.width, 600/img.height);
            ctx.drawImage(img, CX - (img.width*ratio)/2, photoY - (img.height*ratio)/2, img.width*ratio, img.height*ratio);
            ctx.restore();
        }

        // 4. 姓名與部門 (位置上移避免擠壓下方)
        ctx.fillStyle = "white"; ctx.font = "bold 130px Arial"; ctx.fillText(name, CX, 1100);
        ctx.fillStyle = "#94a3b8"; ctx.font = "60px Arial"; ctx.fillText(dept + " • " + shift, CX, 1200);

        // 5. QR Code 容器區域
        const qrBoxW = 750;
        const qrBoxH = 350;
        const qrBoxY = 1320;
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        roundRect(ctx, CX - qrBoxW/2, qrBoxY, qrBoxW, qrBoxH, 40); ctx.fill();

        // 6. QR Code 繪製 (精確計算避免溢出)
        const qr = qrcode(0, 'H'); qr.addData(id); qr.make();
        const cellSize = 9; // 稍微縮小 cellSize 確保不重疊
        const mCount = qr.getModuleCount();
        const qrSize = mCount * cellSize;
        const qrX = CX - qrSize / 2;
        const qrInnerY = qrBoxY + (qrBoxH - qrSize) / 2; // 置中於框內
        
        ctx.fillStyle = "white";
        for (let r = 0; r < mCount; r++) {
            for (let c = 0; c < mCount; c++) {
                if (qr.isDark(r, c)) ctx.fillRect(qrX + c * cellSize, qrInnerY + r * cellSize, cellSize, cellSize);
            }
        }

        // 7. ID 文字 (放置在 QR 框的最下方，並增加外距)
        ctx.font = "bold 45px Arial"; 
        ctx.fillStyle = "#64748b"; // 使用較亮的灰色確保可讀性
        ctx.fillText(id, CX, 1685); 
    }
</script>
