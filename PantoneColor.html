<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 智能取色系統 - 免資料庫版</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; --accent: #0984e3; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .upload-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px dashed var(--accent); cursor: pointer; }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; position: relative; }
        canvas { max-width: 100%; cursor: crosshair; display: block; border-radius: 4px; }
        .panel { width: 320px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .swatch-preview { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding: 10px; background: #fafafa; border-radius: 10px; }
        .swatch-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #eee; }
        .pantone-card { border: 2px solid #eee; border-radius: 12px; overflow: hidden; background: white; transition: transform 0.2s; }
        .card-color { height: 150px; width: 100%; }
        .card-detail { padding: 20px; }
        .brand { font-size: 11px; font-weight: bold; color: #999; margin-bottom: 5px; }
        .color-code { font-size: 24px; font-weight: 900; display: block; color: var(--dark); }
        .color-name { font-size: 16px; color: #636e72; }
        .toast { position: fixed; bottom: 20px; background: var(--dark); color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 智能取色器</h1>
    <p>上傳圖片並點擊，自動比對最接近的色卡</p>
</div>

<div class="upload-box" onclick="document.getElementById('imgInput').click()">
    <span id="uploadText">點擊此處上傳圖片</span>
    <input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="panel">
        <div class="swatch-preview">
            <div id="targetSwatch" class="swatch-circle" style="background: #eee;"></div>
            <div>
                <small style="color:#999">選取的色彩</small>
                <div id="targetHex" style="font-weight: bold; font-family: monospace; font-size: 1.2em;">#------</div>
            </div>
        </div>

        <div id="resultBox" style="display: none;">
            <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">最接近的 Pantone 色號：</p>
            <div class="pantone-card" id="copyBtn">
                <div id="resSwatch" class="card-color"></div>
                <div class="card-detail">
                    <div class="brand">PANTONE<sup>®</sup></div>
                    <div id="resCode" class="color-code">----</div>
                    <div id="resName" class="color-name">----</div>
                </div>
            </div>
            <p style="font-size: 11px; color: #b2bec3; text-align: center; margin-top: 15px;">提示：點擊色卡可複製 HEX 碼</p>
        </div>
    </div>
</div>

<div id="toast" class="toast">已複製色號到剪貼簿！</div>

<script>
    // 內建資料庫：包含年度色、經典色、常用色系
    const pantoneDB = [
        // 近年年度代表色 (Color of the Year)
        {code: "13-1023", name: "Peach Fuzz", hex: "#FFBE98"},
        {code: "18-1750", name: "Viva Magenta", hex: "#BB2649"},
        {code: "17-3938", name: "Very Peri", hex: "#6667AB"},
        {code: "13-0647", name: "Illuminating", hex: "#F5DF4D"},
        {code: "17-5104", name: "Ultimate Gray", hex: "#939597"},
        {code: "19-4052", name: "Classic Blue", hex: "#0F4C81"},
        {code: "16-1546", name: "Living Coral", hex: "#FF6F61"},
        {code: "18-3838", name: "Ultra Violet", hex: "#5F4B8B"},
        
        // 經典常用色
        {code: "11-0601", name: "Bright White", hex: "#F4F5F0"},
        {code: "19-0303", name: "Jet Black", hex: "#2D2C2F"},
        {code: "18-1438", name: "Marsala", hex: "#955251"},
        {code: "15-0343", name: "Greenery", hex: "#88B04B"},
        {code: "13-1520", name: "Rose Quartz", hex: "#F7CAC9"},
        {code: "15-3919", name: "Serenity", hex: "#92A8D1"},
        {code: "18-3224", name: "Radiant Orchid", hex: "#B163A3"},
        {code: "17-5641", name: "Emerald", hex: "#009473"},
        {code: "17-1463", name: "Tangerine Tango", hex: "#DD4124"},
        {code: "18-2120", name: "Honeysuckle", hex: "#D65076"},
        {code: "15-5519", name: "Turquoise", hex: "#45B1E8"},
        {code: "14-0848", name: "Mimosa", hex: "#FFB915"},
        {code: "18-3943", name: "Blue Iris", hex: "#5A5B9F"},
        {code: "19-1557", name: "Chili Pepper", hex: "#9B1B30"},
        
        // 補充常用調性
        {code: "19-1664", name: "True Red", hex: "#BF1932"},
        {code: "12-0815", name: "Vanilla Custard", hex: "#E3D5CA"},
        {code: "19-4029", name: "Navy Peony", hex: "#223A5E"},
        {code: "16-1343", name: "Russet Orange", hex: "#E47127"}
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput');

    imgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 600;
                const scale = img.width > maxW ? maxW / img.width : 1;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById('uploadText').innerText = "已載入: " + file.name;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const rgb = { r: pixel[0], g: pixel[1], b: pixel[2] };
        const hex = rgbToHex(rgb.r, rgb.g, rgb.b);

        document.getElementById('targetSwatch').style.backgroundColor = hex;
        document.getElementById('targetHex').innerText = hex.toUpperCase();

        findMatch(rgb);
    });

    function findMatch(target) {
        let min = Infinity;
        let match = null;

        pantoneDB.forEach(item => {
            const rgb = hexToRgb(item.hex);
            const dist = Math.sqrt(
                Math.pow(target.r - rgb.r, 2) + 
                Math.pow(target.g - rgb.g, 2) + 
                Math.pow(target.b - rgb.b, 2)
            );
            if(dist < min) { min = dist; match = item; }
        });

        if(match) {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resSwatch').style.backgroundColor = match.hex;
            document.getElementById('resCode').innerText = match.code;
            document.getElementById('resName').innerText = match.name;
            
            document.getElementById('copyBtn').onclick = () => {
                navigator.clipboard.writeText(match.hex);
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            };
        }
    }

    function rgbToHex(r, g, b) { 
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join(''); 
    }
    
    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
