<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 專業取色系統</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; --accent: #d63031; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .upload-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px dashed #b2bec3; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--accent); background: #fffafb; }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 650px; }
        canvas { max-width: 100%; cursor: crosshair; display: block; border-radius: 4px; }
        .panel { width: 340px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .swatch-preview { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border: 1px solid #eee; }
        .swatch-circle { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pantone-card { border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: white; cursor: pointer; }
        .card-color { height: 160px; width: 100%; position: relative; }
        .similarity-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 5px; font-size: 10px; }
        .card-detail { padding: 20px; }
        .brand { font-size: 11px; font-weight: bold; color: #b2bec3; margin-bottom: 5px; }
        .color-code { font-size: 26px; font-weight: 900; display: block; color: var(--dark); letter-spacing: -1px; }
        .color-name { font-size: 15px; color: #636e72; margin-top: 5px; }
        .toast { position: fixed; bottom: 30px; background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 專業取色器</h1>
    <p>點擊圖片區域，系統將比對最精確的 Pantone 色號</p>
</div>

<div class="upload-box" onclick="document.getElementById('imgInput').click()">
    <strong id="uploadText">＋ 上傳您的設計稿或照片</strong>
    <input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="panel">
        <div class="swatch-preview">
            <div id="targetSwatch" class="swatch-circle" style="background: #eee;"></div>
            <div>
                <small style="color:#999; font-size: 11px; text-transform: uppercase;">Picked Color</small>
                <div id="targetHex" style="font-weight: bold; font-family: monospace; font-size: 1.3em; color: var(--dark);">#------</div>
            </div>
        </div>

        <div id="resultBox" style="display: none;">
            <div class="pantone-card" id="copyBtn">
                <div id="resSwatch" class="card-color">
                    <div id="similarity" class="similarity-badge"></div>
                </div>
                <div class="card-detail">
                    <div class="brand">PANTONE<sup>®</sup></div>
                    <div id="resCode" class="color-code">----</div>
                    <div id="resName" class="color-name">----</div>
                </div>
            </div>
            <p style="font-size: 11px; color: #b2bec3; text-align: center; margin-top: 15px;">點擊色卡複製 HEX 碼</p>
        </div>
    </div>
</div>

<div id="toast" class="toast">已複製 HEX 碼到剪貼簿</div>

<script>
    // 加強版資料庫：針對大地色、灰色、膚色、深色系進行細分
    const pantoneDB = [
        // 大地色、咖啡色、米色、木質色系 (加強)
        {code: "16-1315", name: "Muffin", hex: "#ad8b75"},
        {code: "17-1128", name: "Indian Tan", hex: "#a17a61"},
        {code: "18-1140", name: "Cadet", hex: "#97755d"},
        {code: "16-1120", name: "Sand", hex: "#b29d81"},
        {code: "15-1215", name: "Sesame", hex: "#c2ab9a"},
        {code: "18-1148", name: "Oak", hex: "#8e6d51"},
        {code: "19-1218", name: "Potting Soil", hex: "#4b3d33"},
        {code: "17-1310", name: "Timber Wolf", hex: "#958c83"},
        {code: "16-1412", name: "Pristine", hex: "#e2d2ca"},
        {code: "17-1118", name: "Gingerbread", hex: "#8c6a56"},
        {code: "18-1031", name: "Toffee", hex: "#755139"},
        {code: "15-1213", name: "Sand Dollar", hex: "#decdbe"},
        {code: "16-1320", name: "Nougat", hex: "#ad8d77"},
        {code: "18-1244", name: "Ginger Spice", hex: "#b65d3a"},
        {code: "19-1122", name: "Cocoa Brown", hex: "#4c3024"},
        {code: "18-1022", name: "Zebra Sage", hex: "#8d8070"},
        {code: "17-1312", name: "Brushed Nickel", hex: "#938782"},
        {code: "19-0912", name: "Chocolate Plum", hex: "#3c2e2c"},
        
        // 灰色與中性色系 (細分)
        {code: "17-5104", name: "Ultimate Gray", hex: "#939597"},
        {code: "14-4107", name: "Quiet Gray", hex: "#b7bab9"},
        {code: "18-4005", name: "Steel Gray", hex: "#717173"},
        {code: "19-3906", name: "Dark Shadow", hex: "#4f4f51"},
        {code: "16-3802", name: "Ash", hex: "#a1a0a1"},
        {code: "13-4403", name: "Silver Birch", hex: "#d1d3d4"},
        
        // 經典色與年度色
        {code: "19-4052", name: "Classic Blue", hex: "#0f4c81"},
        {code: "13-1023", name: "Peach Fuzz", hex: "#ffbe98"},
        {code: "18-1750", name: "Viva Magenta", hex: "#bb2649"},
        {code: "17-3938", name: "Very Peri", hex: "#6667ab"},
        {code: "13-0647", name: "Illuminating", hex: "#f5df4d"},
        {code: "11-0601", name: "Bright White", hex: "#f4f5f0"},
        {code: "19-0303", name: "Jet Black", hex: "#2d2c2f"},
        {code: "15-0343", name: "Greenery", hex: "#88b04b"},
        {code: "16-1546", name: "Living Coral", hex: "#ff6f61"},
        {code: "19-1557", name: "Chili Pepper", hex: "#9b1b30"},
        {code: "15-5519", name: "Turquoise", hex: "#45b1e8"},
        {code: "18-3838", name: "Ultra Violet", hex: "#5f4b8b"}
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput');

    imgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 650;
                const scale = img.width > maxW ? maxW / img.width : 1;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById('uploadText').innerText = "已載入圖片，請點擊取色";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const rgb = { r: pixel[0], g: pixel[1], b: pixel[2] };
        const hex = rgbToHex(rgb.r, rgb.g, rgb.b);

        document.getElementById('targetSwatch').style.backgroundColor = hex;
        document.getElementById('targetHex').innerText = hex.toUpperCase();

        findMatch(rgb);
    });

    function findMatch(target) {
        let min = Infinity;
        let match = null;

        pantoneDB.forEach(item => {
            const rgb = hexToRgb(item.hex);
            const dist = Math.sqrt(
                Math.pow(target.r - rgb.r, 2) + 
                Math.pow(target.g - rgb.g, 2) + 
                Math.pow(target.b - rgb.b, 2)
            );
            if(dist < min) { min = dist; match = item; }
        });

        if(match) {
            // 計算相似度 (0-441 是 RGB 最大距離)
            const similarity = Math.max(0, 100 - (min / 441 * 100)).toFixed(1);
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resSwatch').style.backgroundColor = match.hex;
            document.getElementById('similarity').innerText = "相似度 " + similarity + "%";
            document.getElementById('resCode').innerText = match.code;
            document.getElementById('resName').innerText = match.name;
            
            document.getElementById('copyBtn').onclick = () => {
                navigator.clipboard.writeText(match.hex);
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            };
        }
    }

    function rgbToHex(r, g, b) { 
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join(''); 
    }
    
    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
