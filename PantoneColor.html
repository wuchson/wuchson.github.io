<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 智能取色系統 - 專業版</title>
    <style>
        :root {
            --dark: #2d3436;
            --light: #f5f6fa;
            --accent: #0984e3;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .upload-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px dashed var(--accent); }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; }
        canvas { max-width: 100%; cursor: crosshair; display: block; }
        .panel { width: 320px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 15px; }
        .status-ok { background: #e1f5fe; color: #01579b; }
        .status-error { background: #ffebee; color: #b71c1c; }
        .swatch-preview { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .swatch-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #eee; }
        .pantone-card { border: 2px solid #eee; border-radius: 12px; overflow: hidden; }
        .card-color { height: 120px; width: 100%; }
        .card-detail { padding: 15px; }
        .brand { font-size: 11px; font-weight: bold; color: #999; }
        .color-code { font-size: 22px; font-weight: 900; display: block; }
        .toast { position: fixed; bottom: 20px; background: var(--dark); color: white; padding: 10px 20px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 智能取色系統</h1>
    <div id="dataStatus" class="status-tag status-error">正在載入資料庫...</div>
</div>

<div class="upload-box">
    <input type="file" id="imgInput" accept="image/*">
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="panel">
        <div class="swatch-preview">
            <div id="targetSwatch" class="swatch-circle" style="background: #eee;"></div>
            <div>
                <small>目前取色</small>
                <div id="targetHex" style="font-weight: bold;">#------</div>
            </div>
        </div>

        <div id="resultBox" style="display: none;">
            <div class="pantone-card" id="copyBtn">
                <div id="resSwatch" class="card-color"></div>
                <div class="card-detail">
                    <div class="brand">PANTONE®</div>
                    <div id="resCode" class="color-code">----</div>
                    <div id="resName" style="color: #666;">----</div>
                </div>
            </div>
            <p style="font-size: 12px; color: #999; text-align: center; margin-top: 10px;">點擊色卡可複製 HEX 碼</p>
        </div>
    </div>
</div>

<div id="toast" class="toast">已複製到剪貼簿</div>

<script>
    let pantoneDB = [];
    const statusTag = document.getElementById('dataStatus');

    // 1. 自動載入外部 JSON 檔案 (假設檔名為 colors.json)
    // 如果你下載的檔案叫 pantone.json，請修改下面的檔名
    fetch('colors.json') 
        .then(response => {
            if (!response.ok) throw new Error('找不到檔案');
            return response.json();
        })
        .then(data => {
            pantoneDB = data;
            statusTag.innerText = `資料庫就緒: ${pantoneDB.length} 色`;
            statusTag.className = "status-tag status-ok";
        })
        .catch(err => {
            statusTag.innerText = "資料庫載入失敗，使用預設範例";
            statusTag.className = "status-tag status-error";
            // 備用數據
            pantoneDB = [{code: "19-4052", name: "Classic Blue", hex: "#0F4C81"}];
        });

    // 2. 圖片處理邏輯
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    document.getElementById('imgInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 3. 點擊取色與比對
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const rgb = { r: pixel[0], g: pixel[1], b: pixel[2] };
        const hex = rgbToHex(rgb.r, rgb.g, rgb.b);

        document.getElementById('targetSwatch').style.backgroundColor = hex;
        document.getElementById('targetHex').innerText = hex.toUpperCase();

        findMatch(rgb);
    });

    function findMatch(target) {
        let min = Infinity;
        let match = null;

        pantoneDB.forEach(item => {
            const rgb = hexToRgb(item.hex);
            const dist = Math.sqrt(Math.pow(target.r-rgb.r,2) + Math.pow(target.g-rgb.g,2) + Math.pow(target.b-rgb.b,2));
            if(dist < min) { min = dist; match = item; }
        });

        if(match) {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resSwatch').style.backgroundColor = match.hex;
            document.getElementById('resCode').innerText = match.code;
            document.getElementById('resName').innerText = match.name;
            
            document.getElementById('copyBtn').onclick = () => {
                navigator.clipboard.writeText(match.hex);
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            };
        }
    }

    function rgbToHex(r, g, b) { return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join(''); }
    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
