<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 專業級取色系統 (LAB 演算法)</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; --accent: #1e272e; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .canvas-container { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 650px; }
        canvas { max-width: 100%; cursor: crosshair; display: block; border-radius: 4px; }
        .panel { width: 350px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .swatch-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .color-compare { display: flex; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .compare-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .pantone-card { border: 2px solid #2d3436; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .card-detail { padding: 20px; background: #fff; }
        .color-code { font-size: 28px; font-weight: 900; margin: 5px 0; }
        .similarity-label { font-size: 12px; padding: 4px 10px; background: #2d3436; color: #fff; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<h1>Pantone 專業取色器 (LAB 模式)</h1>
<input type="file" id="imgInput" accept="image/*" style="margin-bottom: 20px;">

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="panel">
        <div class="swatch-group">
            <div class="color-compare">
                <div id="boxPicked" class="compare-box" style="background: #eee;">PICKED</div>
                <div id="boxMatch" class="compare-box" style="background: #ccc;">MATCH</div>
            </div>
            <div id="hexDisplay" style="text-align: center; font-family: monospace; font-weight: bold;">#------</div>
        </div>

        <div id="resultBox" style="display: none;">
            <div id="simValue" class="similarity-label">相似度: --%</div>
            <div class="pantone-card">
                <div id="resSwatch" style="height: 180px;"></div>
                <div class="card-detail">
                    <div style="color: #999; font-size: 12px; font-weight: bold;">PANTONE®</div>
                    <div id="resCode" class="color-code">----</div>
                    <div id="resName" style="color: #636e72;">----</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 數據庫進一步擴充（針對大地色精確細分）
    const pantoneDB = [
        {code: "16-1120", name: "Sand", hex: "#B29D81"},
        {code: "16-1320", name: "Nougat", hex: "#AD8D77"},
        {code: "15-1214", name: "Warm Sand", hex: "#C5AD93"},
        {code: "16-1315", name: "Muffin", hex: "#AD8B75"},
        {code: "17-1128", name: "Indian Tan", hex: "#A17A61"},
        {code: "16-1310", name: "Timber Wolf", hex: "#958C83"},
        {code: "15-1116", name: "Safari", hex: "#BB9E7C"},
        {code: "14-1118", name: "Beige", hex: "#D4BEA3"},
        {code: "16-1110", name: "Dovetail", hex: "#A59784"},
        {code: "17-1118", name: "Gingerbread", hex: "#8C6A56"},
        {code: "11-0601", name: "Bright White", hex: "#F4F5F0"},
        {code: "19-0303", name: "Jet Black", hex: "#2D2C2F"},
        {code: "19-4052", name: "Classic Blue", hex: "#0F4C81"},
        // 可以繼續添加數千個...
    ];

    // --- 色彩科學核心：LAB 轉換與比對 ---

    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;

        x /= 95.047; y /= 100.000; z /= 108.883;
        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16 / 116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16 / 116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16 / 116);

        return { l: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }

    function deltaE(lab1, lab2) {
        return Math.sqrt(Math.pow(lab1.l - lab2.l, 2) + Math.pow(lab1.a - lab2.a, 2) + Math.pow(lab1.b - lab2.b, 2));
    }

    // --- 介面邏輯 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        const pickedLab = rgbToLab(p[0], p[1], p[2]);
        const hex = "#" + [p[0], p[1], p[2]].map(x => x.toString(16).padStart(2, '0')).join('');

        document.getElementById('boxPicked').style.background = hex;
        document.getElementById('hexDisplay').innerText = hex.toUpperCase();

        let minE = Infinity;
        let match = null;

        pantoneDB.forEach(color => {
            const cRgb = hexToRgb(color.hex);
            const cLab = rgbToLab(cRgb.r, cRgb.g, cRgb.b);
            const diff = deltaE(pickedLab, cLab);
            if (diff < minE) { minE = diff; match = color; }
        });

        if (match) {
            const sim = Math.max(0, 100 - minE).toFixed(1);
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('boxMatch').style.background = match.hex;
            document.getElementById('resSwatch').style.background = match.hex;
            document.getElementById('simValue').innerText = `感知相似度: ${sim}%`;
            document.getElementById('resCode').innerText = match.code;
            document.getElementById('resName').innerText = match.name;
        }
    };

    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
