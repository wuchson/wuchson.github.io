<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 色號查詢系統</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; --accent: #d63031; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .status { font-size: 12px; padding: 6px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; }
        .status-ok { background: #55efc4; color: #00b894; }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-container { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 650px; }
        canvas { max-width: 100%; cursor: crosshair; display: block; border-radius: 4px; background: #eee; }
        .panel { width: 350px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .compare-bar { display: flex; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; margin-bottom: 20px; position: relative; }
        .box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .vs { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; border-radius: 50%; width: 26px; height: 26px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .main-card { border: 2px solid var(--dark); border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-swatch { height: 150px; width: 100%; }
        .card-info { padding: 15px; background: white; }
        .btn-search { display: inline-block; margin-top: 10px; padding: 5px 10px; background: #0984e3; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; }
        .candidate-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .candidate-item { width: 58px; height: 75px; border-radius: 6px; border: 2px solid #eee; cursor: pointer; overflow: hidden; }
        .candidate-item.active { border-color: var(--dark); transform: scale(1.05); }
        .c-swatch { height: 45px; width: 100%; }
        .c-label { font-size: 8px; text-align: center; padding: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 色號查詢</h1>
    <div id="loadStatus" class="status">載入中...</div>
    <input type="file" id="imgInput" accept="image/*">
</div>

<div class="workspace">
    <div class="canvas-container"><canvas id="canvas"></canvas></div>
    <div class="panel">
        <div class="compare-bar">
            <div id="boxPicked" class="box" style="background: #eee;">PICKED</div>
            <div class="vs">VS</div>
            <div id="boxMatch" class="box" style="background: #ddd;">MATCH</div>
        </div>
        <div id="resultArea" style="display: none;">
            <div class="main-card">
                <div id="mainSwatch" class="card-swatch"></div>
                <div class="card-info">
                    <div style="font-size: 11px; color:#999; font-weight: bold;">PANTONE® NAME</div>
                    <div id="resNameDisplay" style="font-size: 22px; font-weight: 900; margin: 4px 0; text-transform: uppercase;">----</div>
                    <div id="resHex" style="color: #636e72; font-family: monospace;">#------</div>
                    <a id="searchLink" href="#" target="_blank" class="btn-search">查詢對應色號 🔍</a>
                </div>
            </div>
            <div style="font-size: 14px; font-weight: bold;">🔍 肉眼推薦候選色：</div>
            <div id="candidateList" class="candidate-list"></div>
        </div>
    </div>
</div>

<script>
    let pantoneDB = [];
    
    // 讀取 JSON
    fetch('./pantone-colors.json')
        .then(res => res.json())
        .then(json => {
            if (json.names && json.values) {
                json.names.forEach((name, i) => {
                    const hex = json.values[i];
                    const rgb = hexToRgb(hex);
                    const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
                    pantoneDB.push({ name, hex, lab });
                });
            }
            document.getElementById('loadStatus').innerText = `✅ 已載入 ${pantoneDB.length} 個顏色`;
            document.getElementById('loadStatus').className = "status status-ok";
        });

    // 核心比對邏輯
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 650;
                const scale = img.width > maxW ? maxW / img.width : 1;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onclick = (e) => {
        if (pantoneDB.length === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');
        const pickedLab = rgbToLab(p[0], p[1], p[2]);

        document.getElementById('boxPicked').style.background = hex;
        document.getElementById('resultArea').style.display = 'block';

        let matches = pantoneDB.map(c => ({...c, diff: deltaE(pickedLab, c.lab)}))
                               .sort((a, b) => a.diff - b.diff).slice(0, 6);
        renderUI(matches);
    };

    function renderUI(matches) {
        const list = document.getElementById('candidateList');
        list.innerHTML = '';
        matches.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `candidate-item ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<div class="c-swatch" style="background:${m.hex}"></div><div class="c-label">${m.name}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                updateMain(m);
            };
            list.appendChild(div);
        });
        updateMain(matches[0]);
    }

    function updateMain(m) {
        document.getElementById('boxMatch').style.background = m.hex;
        document.getElementById('mainSwatch').style.background = m.hex;
        document.getElementById('resNameDisplay').innerText = m.name;
        document.getElementById('resHex').innerText = m.hex.toUpperCase();
        // 增加一個自動搜尋色號的連結
        document.getElementById('searchLink').href = `https://www.google.com/search?q=Pantone+${m.name.replace(/-/g, '+')}+code`;
    }

    // 色彩轉換函數 (LAB)
    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
        x /= 95.047; y /= 100.000; z /= 108.883;
        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16/116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16/116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16/116);
        return { l: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }

    function deltaE(lab1, lab2) {
        return Math.sqrt(Math.pow(lab1.l - lab2.l, 2) + Math.pow(lab1.a - lab2.a, 2) + Math.pow(lab1.b - lab2.b, 2));
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
