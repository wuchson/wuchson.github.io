<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone 萬筆資料專業對色系統</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; --accent: #d63031; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .status-bar { padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .loading { background: #ffeaa7; color: #d35400; }
        .ready { background: #55efc4; color: #00b894; }
        
        .workspace { display: flex; gap: 30px; max-width: 1250px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-area { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        canvas { width: 100%; cursor: crosshair; display: block; border-radius: 4px; background: #eee; }
        
        .panel { width: 360px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .compare-box { display: flex; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; margin-bottom: 20px; position: relative; }
        .color-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .vs-tag { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .main-card { border: 2px solid var(--dark); border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-swatch { height: 160px; width: 100%; transition: background 0.2s; }
        .card-info { padding: 15px; }
        
        .candidate-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .candidate-item { border-radius: 8px; border: 2px solid #eee; cursor: pointer; transition: 0.2s; background: #fff; overflow: hidden; padding-bottom: 5px; }
        .candidate-item.active { border-color: var(--dark); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .c-swatch { height: 40px; width: 100%; }
        .c-name { font-size: 9px; text-align: center; font-weight: bold; margin-top: 4px; padding: 0 2px; height: 24px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 視覺對色系統 <small style="font-size: 14px; opacity: 0.6;">(10,000+ 色號版)</small></h1>
    <div id="status" class="status-bar loading">正在掃描資料庫檔案...</div>
    <input type="file" id="imgInput" accept="image/*">
</div>

<div class="workspace">
    <div class="canvas-area"><canvas id="canvas"></canvas></div>
    
    <div class="panel">
        <div class="compare-box">
            <div id="boxPicked" class="color-half" style="background: #eee;">圖片取色</div>
            <div class="vs-tag">VS</div>
            <div id="boxMatch" class="color-half" style="background: #ddd;">色卡結果</div>
        </div>

        <div id="resultArea" style="display: none;">
            <div class="main-card">
                <div id="mainSwatch" class="card-swatch"></div>
                <div class="card-info">
                    <div style="font-size: 11px; color:#999; font-weight: bold;">PANTONE®</div>
                    <div id="resCode" style="font-size: 20px; font-weight: 900; margin: 4px 0; line-height: 1.2;">----</div>
                    <div id="resHex" style="color: #636e72; font-size: 14px; font-family: monospace;">#------</div>
                </div>
            </div>
            <div style="font-size: 13px; font-weight: bold; color: #636e72;">👇 肉眼最接近候選色 (Top 9)</div>
            <div id="candidateGrid" class="candidate-grid"></div>
        </div>
    </div>
</div>

<script>
    let pantoneDB = [];
    const filesToLoad = ['./pantone-colors.json', './output.json']; // 你可以繼續往後增加檔名

    // --- 1. 自動適配解析器 (核心) ---
    async function initDB() {
        for (const file of filesToLoad) {
            try {
                const res = await fetch(file);
                const data = await res.json();
                parseData(data);
            } catch (e) { console.log(`跳過未找到的檔案: ${file}`); }
        }
        document.getElementById('status').innerText = `✅ 系統就緒：已載入 ${pantoneDB.length} 個專業色號`;
        document.getElementById('status').className = "status-bar ready";
    }

    function parseData(data) {
        // 格式 A: { names: [], values: [] }
        if (data.names && data.values) {
            data.names.forEach((n, i) => addColor(n, data.values[i]));
        }
        // 格式 B: [ { name: "", hex: "" }, ... ]
        else if (Array.isArray(data)) {
            data.forEach(item => addColor(item.name || item.code, item.hex));
        }
        // 格式 C: { "Category": [ { name, hex } ] }
        else {
            for (let cat in data) {
                if (Array.isArray(data[cat])) data[cat].forEach(item => addColor(item.name, item.hex));
            }
        }
    }

    function addColor(name, hex) {
        if (!name || !hex) return;
        const rgb = hexToRgb(hex);
        const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
        pantoneDB.push({ name, hex, lab });
    }

    // --- 2. 圖片與互動 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(800 / img.width, 1);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onclick = (e) => {
        if (pantoneDB.length === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');
        const pickedLab = rgbToLab(p[0], p[1], p[2]);

        document.getElementById('boxPicked').style.background = hex;
        document.getElementById('resultArea').style.display = 'block';

        // 萬筆搜尋優化
        let matches = pantoneDB.map(c => ({...c, diff: deltaE(pickedLab, c.lab)}))
                               .sort((a, b) => a.diff - b.diff).slice(0, 9);
        renderUI(matches);
    };

    function renderUI(matches) {
        const grid = document.getElementById('candidateGrid');
        grid.innerHTML = '';
        matches.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `candidate-item ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<div class="c-swatch" style="background:${m.hex}"></div><div class="c-name">${m.name}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                updateMain(m);
            };
            grid.appendChild(div);
        });
        updateMain(matches[0]);
    }

    function updateMain(m) {
        document.getElementById('boxMatch').style.background = m.hex;
        document.getElementById('mainSwatch').style.background = m.hex;
        document.getElementById('resCode').innerText = m.name;
        document.getElementById('resHex').innerText = m.hex.toUpperCase();
    }

    // --- 3. 色彩科學演算法 ---
    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
        x /= 95.047; y /= 100.000; z /= 108.883;
        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16/116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16/116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16/116);
        return { l: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }
    function deltaE(lab1, lab2) {
        return Math.sqrt(Math.pow(lab1.l-lab2.l,2) + Math.pow(lab1.a-lab2.a,2) + Math.pow(lab1.b-lab2.b,2));
    }
    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }

    initDB();
</script>
</body>
</html>
