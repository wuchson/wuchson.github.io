<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Pantone 專業對色系統 (C卡+TCX 整合版)</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .status-bar { padding: 10px 25px; border-radius: 30px; font-size: 14px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .ready { background: #55efc4; color: #00b894; }
        .workspace { display: flex; gap: 30px; max-width: 1300px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-area { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex: 1; min-width: 450px; text-align: center; }
        canvas { width: 100%; cursor: crosshair; display: block; border-radius: 10px; background: #fafafa; border: 1px solid #eee; }
        .panel { width: 380px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .compare-box { display: flex; height: 110px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; margin-bottom: 20px; position: relative; }
        .color-half { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .main-card { border: 2.5px solid var(--dark); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .card-swatch { height: 150px; width: 100%; }
        .card-info { padding: 15px; background: #fff; }
        .candidate-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .candidate-item { border-radius: 10px; border: 2px solid #f0f0f0; cursor: pointer; transition: 0.2s; background: #fff; overflow: hidden; text-align: center; padding-bottom: 5px; }
        .candidate-item.active { border-color: var(--dark); transform: scale(1.05); }
        .c-swatch { height: 45px; width: 100%; }
        .c-name { font-size: 9px; font-weight: bold; height: 32px; display: flex; align-items: center; justify-content: center; line-height: 1.1; padding: 0 4px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 專業對色系統</h1>
    <div id="status" class="status-bar">讀取資料中...</div>
    <input type="file" id="imgInput" accept="image/*">
</div>

<div class="workspace">
    <div class="canvas-area">
        <canvas id="canvas"></canvas>
        <p style="font-size: 12px; color: #999;">點擊圖片取色後，系統會自動在 C卡與 TCX 庫中搜尋</p>
    </div>
    
    <div class="panel">
        <div class="compare-box">
            <div id="boxPicked" class="color-half" style="background: #eee; color: #999;">IMAGE</div>
            <div id="boxMatch" class="color-half" style="background: #ddd; color: #999;">MATCH</div>
        </div>

        <div id="resultArea" style="display: none;">
            <div class="main-card">
                <div id="mainSwatch" class="card-swatch"></div>
                <div class="card-info">
                    <div id="libTitle" style="font-size: 10px; color:#999; font-weight: bold;">PANTONE®</div>
                    <div id="resCode" style="font-size: 20px; font-weight: 900; margin: 2px 0;">----</div>
                    <div id="resHex" style="color: #636e72; font-size: 14px; font-family: monospace;">#------</div>
                </div>
            </div>
            <div id="candidateGrid" class="candidate-grid"></div>
        </div>
    </div>
</div>

<script>
    let pantoneDB = [];
    
    // 對應你目前上傳的兩份檔案名稱
    const config = [
        { file: './pantone-full.json', type: 'LAB' },
        { file: './pantone-colors.json', type: 'HEX' }
    ];

    async function init() {
        for (const item of config) {
            try {
                const res = await fetch(item.file);
                const data = await res.json();
                
                if (item.type === 'LAB') { // 處理 pantone-full.json
                    data.colors.forEach(c => {
                        const lab = { l: c.components[0], a: c.components[1], b: c.components[2] };
                        pantoneDB.push({ name: c.name, lab, hex: labToHex(lab.l, lab.a, lab.b), lib: 'Solid Coated (C)' });
                    });
                } else { // 處理 pantone-colors.json (TCX)
                    data.names.forEach((n, i) => {
                        const hex = data.values[i];
                        const rgb = hexToRgb(hex);
                        pantoneDB.push({ name: n.toUpperCase(), lab: rgbToLab(rgb.r, rgb.g, rgb.b), hex, lib: 'FHI TCX SERIES' });
                    });
                }
            } catch (e) { console.error("加載失敗:", item.file); }
        }
        document.getElementById('status').innerText = `✅ 已就緒：共載入 ${pantoneDB.length} 個色號 (C卡 + TCX)`;
        document.getElementById('status').className = "status-bar ready";
    }

    // --- 互動與色彩轉換核心 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(800 / img.width, 1);
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onclick = (e) => {
        if (pantoneDB.length === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        const pickedLab = rgbToLab(p[0], p[1], p[2]);
        const pickedHex = "#" + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');

        document.getElementById('boxPicked').style.background = pickedHex;
        document.getElementById('resultArea').style.display = 'block';

        let matches = pantoneDB.map(c => ({
            ...c,
            diff: Math.sqrt(Math.pow(pickedLab.l-c.lab.l,2) + Math.pow(pickedLab.a-c.lab.a,2) + Math.pow(pickedLab.b-c.lab.b,2))
        })).sort((a, b) => a.diff - b.diff).slice(0, 9);

        const grid = document.getElementById('candidateGrid');
        grid.innerHTML = '';
        matches.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `candidate-item ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<div class="c-swatch" style="background:${m.hex}"></div><div class="c-name">${m.name}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                updateMain(m);
            };
            grid.appendChild(div);
        });
        updateMain(matches[0]);
    };

    function updateMain(m) {
        document.getElementById('boxMatch').style.background = m.hex;
        document.getElementById('mainSwatch').style.background = m.hex;
        document.getElementById('resCode').innerText = m.name;
        document.getElementById('resHex').innerText = m.hex.toUpperCase();
        document.getElementById('libTitle').innerText = m.lib;
    }

    // 工具函數
    function hexToRgb(h) {
        return { r: parseInt(h.substring(1,3),16), g: parseInt(h.substring(3,5),16), b: parseInt(h.substring(5,7),16) };
    }
    function labToHex(l, a, b) {
        let y = (l + 16) / 116, x = a / 500 + y, z = y - b / 200;
        [x, y, z] = [x, y, z].map(v => v > 0.206893 ? v ** 3 : (v - 16/116)/7.787);
        let r = x * 3.2406 + y * -1.5372 + z * -0.4986, g = x * -0.9689 + y * 1.8758 + z * 0.0415, b_ = x * 0.0557 + y * -0.2040 + z * 1.0570;
        [r, g, b_] = [r, g, b_].map(v => v > 0.0031308 ? 1.055 * (v ** (1/2.4)) - 0.055 : 12.92 * v);
        const toH = v => Math.max(0, Math.min(255, Math.round(v * 255))).toString(16).padStart(2, '0');
        return `#${toH(r)}${toH(g)}${toH(b_)}`;
    }
    function rgbToLab(r, g, b) {
        r/=255; g/=255; b/=255;
        [r, g, b] = [r, g, b].map(v => v > 0.04045 ? ((v+0.055)/1.055)**2.4 : v/12.92);
        let x = (r*0.4124 + g*0.3576 + b*0.1805)*100, y = (r*0.2126 + g*0.7152 + b*0.0722)*100, z = (r*0.0193 + g*0.1192 + b*0.9505)*100;
        x/=95.047; y/=100; z/=108.883;
        [x, y, z] = [x, y, z].map(v => v > 0.008856 ? v**(1/3) : 7.787*v + 16/116);
        return { l: 116*y-16, a: 500*(x-y), b: 200*(y-z) };
    }
    init();
</script>
</body>
</html>
