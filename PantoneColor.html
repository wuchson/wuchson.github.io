<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Pantone 專業萬筆對色系統 (Lab 高精度版)</title>
    <style>
        :root { --dark: #2d3436; --light: #f5f6fa; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .status { padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: bold; margin-bottom: 15px; }
        .ready { background: #55efc4; color: #00b894; }
        .workspace { display: flex; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .canvas-area { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex: 1; }
        canvas { width: 100%; cursor: crosshair; display: block; border-radius: 4px; background: #eee; }
        .panel { width: 360px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .compare-box { display: flex; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; margin-bottom: 20px; position: relative; }
        .color-half { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .main-card { border: 2px solid var(--dark); border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-swatch { height: 160px; width: 100%; }
        .card-info { padding: 15px; }
        .candidate-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .candidate-item { border-radius: 8px; border: 2px solid #eee; cursor: pointer; transition: 0.2s; background: #fff; overflow: hidden; text-align: center; }
        .candidate-item.active { border-color: var(--dark); transform: scale(1.05); }
        .c-swatch { height: 40px; width: 100%; }
        .c-name { font-size: 9px; font-weight: bold; padding: 4px 2px; height: 28px; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pantone 專業對色系統</h1>
    <div id="status" class="status">載入中...</div>
    <input type="file" id="imgInput" accept="image/*">
</div>

<div class="workspace">
    <div class="canvas-area"><canvas id="canvas"></canvas></div>
    <div class="panel">
        <div class="compare-box">
            <div id="boxPicked" class="color-half">圖片取色</div>
            <div id="boxMatch" class="color-half">色標比對</div>
        </div>
        <div id="resultArea" style="display: none;">
            <div class="main-card">
                <div id="mainSwatch" class="card-swatch"></div>
                <div class="card-info">
                    <div style="font-size: 11px; color:#999; font-weight: bold;">PANTONE® 2024</div>
                    <div id="resCode" style="font-size: 18px; font-weight: 900; margin: 4px 0;">----</div>
                    <div id="resHex" style="color: #636e72; font-size: 14px; font-family: monospace;">#------</div>
                </div>
            </div>
            <div style="font-size: 13px; font-weight: bold; color: #636e72;">👇 最接近候選色 (Top 9)</div>
            <div id="candidateGrid" class="candidate-grid"></div>
        </div>
    </div>
</div>

<script>
    let pantoneDB = [];

    // --- 1. 專門針對 pantone-full.json 的解析器 ---
    fetch('./pantone-full.json')
        .then(res => res.json())
        .then(data => {
            pantoneDB = data.colors.map(c => {
                // 檔案內 components 是 [L, a, b]
                const lab = { l: c.components[0], a: c.components[1], b: c.components[2] };
                const hex = labToHex(lab.l, lab.a, lab.b);
                return { name: c.name, lab, hex };
            });
            document.getElementById('status').innerText = `✅ 已載入 ${data.title}：共 ${pantoneDB.length} 個顏色`;
            document.getElementById('status').className = "status ready";
        })
        .catch(err => {
            document.getElementById('status').innerText = "❌ 檔案讀取失敗，請確認檔案名稱為 pantone-full.json";
        });

    // --- 2. 圖片處理 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(800 / img.width, 1);
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- 3. 取色與 Lab 比對 ---
    canvas.onclick = (e) => {
        if (pantoneDB.length === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        
        // 圖片點擊的 RGB 轉 Lab
        const pickedLab = rgbToLab(p[0], p[1], p[2]);
        const pickedHex = "#" + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');

        document.getElementById('boxPicked').style.background = pickedHex;
        document.getElementById('resultArea').style.display = 'block';

        // 使用 Delta E 進行比對
        let matches = pantoneDB.map(c => ({
            ...c,
            diff: Math.sqrt(Math.pow(pickedLab.l-c.lab.l,2) + Math.pow(pickedLab.a-c.lab.a,2) + Math.pow(pickedLab.b-c.lab.b,2))
        })).sort((a, b) => a.diff - b.diff).slice(0, 9);

        renderUI(matches);
    };

    function renderUI(matches) {
        const grid = document.getElementById('candidateGrid');
        grid.innerHTML = '';
        matches.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `candidate-item ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<div class="c-swatch" style="background:${m.hex}"></div><div class="c-name">${m.name.replace('PANTONE ', '')}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                updateMain(m);
            };
            grid.appendChild(div);
        });
        updateMain(matches[0]);
    }

    function updateMain(m) {
        document.getElementById('boxMatch').style.background = m.hex;
        document.getElementById('mainSwatch').style.background = m.hex;
        document.getElementById('resCode').innerText = m.name;
        document.getElementById('resHex').innerText = m.hex.toUpperCase();
    }

    // --- 4. 專業色彩轉換公式 (Lab <-> RGB) ---
    function labToHex(l, a, b) {
        let y = (l + 16) / 116, x = a / 500 + y, z = y - b / 200;
        [x, y, z] = [x, y, z].map(v => v > 0.206893 ? v ** 3 : (v - 16 / 116) / 7.787);
        let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
        let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
        let b_ = x * 0.0557 + y * -0.2040 + z * 1.0570;
        [r, g, b_] = [r, g, b_].map(v => v > 0.0031308 ? 1.055 * (v ** (1 / 2.4)) - 0.055 : 12.92 * v);
        const toHex = v => Math.max(0, Math.min(255, Math.round(v * 255))).toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b_)}`;
    }

    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        [r, g, b] = [r, g, b].map(v => v > 0.04045 ? ((v + 0.055) / 1.055) ** 2.4 : v / 12.92);
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100, y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100, z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
        x /= 95.047; y /= 100.0; z /= 108.883;
        [x, y, z] = [x, y, z].map(v => v > 0.008856 ? v ** (1 / 3) : 7.787 * v + 16 / 116);
        return { l: 116 * y - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }
</script>
</body>
</html>
