<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣告投放管理控制台 - 連結強化版</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .card { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .section { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-size: 20px; }
        label { display: block; font-weight: bold; margin: 15px 0 5px; color: #555; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; height: 50px; font-size: 16px; }
        .btn-main:hover { background: #0056b3; }
        .code-area { background: #2d2d2d; color: #61dafb; padding: 20px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; margin-top: 15px; border: 1px solid #444; }
        .btn-copy { background: var(--success); color: white; border: none; cursor: pointer; margin-top: 15px; font-weight: bold; }
        .hint { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 廣告投放管理控制台 (連結強化版)</h2>
    
    <div class="section">
        <label>1. 連線設定</label>
        <input type="text" id="gasUrl" placeholder="請貼上 GAS 部署網址 (結尾為 /exec)" oninput="genEmbed()">
    </div>

    <div class="section">
        <label>2. 廣告內容設定</label>
        <div class="row">
            <input type="text" id="zoneId" placeholder="區域 ID (如: Top-01)" oninput="genEmbed()">
            <select id="adType" onchange="toggleEditor()">
                <option value="圖片">圖片廣告</option>
                <option value="文字">文字廣告 (支援連結/信箱)</option>
            </select>
        </div>

        <div class="row">
            <label style="flex:1">開始時間：<input type="datetime-local" id="startTime"></label>
            <label style="flex:1">結束時間：<input type="datetime-local" id="endTime"></label>
        </div>

        <div id="imageEditor">
            <label>選擇圖片</label>
            <input type="file" id="fileIn" accept="image/*">
            <label>點擊跳轉網址</label>
            <input type="url" id="linkUrl" placeholder="https://www.example.com">
        </div>

        <div id="textEditor" style="display:none;">
            <label>輸入文字內容與連結</label>
            <div id="textRows"></div>
            <button onclick="addTextRow()" style="width:auto; background:#6c757d; color:white; border:none; padding:8px 15px; margin-top:10px; cursor:pointer;">+ 增加一行文字</button>
        </div>
    </div>

    <button class="btn-main" onclick="publishAd()">📤 確認發佈廣告</button>

    <div class="section" style="margin-top:40px; border-top: 4px solid var(--success); border-left: none;">
        <h2 style="color:var(--success)">📦 網頁嵌入語法</h2>
        <input type="text" id="jsPath" value="https://XXX.github.io/ad-loader.js" oninput="genEmbed()">
        <div class="code-area" id="embedOutput">請先填寫上方資訊...</div>
        <button class="btn-copy" onclick="copyEmbedCode()">📋 複製代碼</button>
    </div>
</div>

<script>
    function toggleEditor() {
        const type = document.getElementById('adType').value;
        document.getElementById('imageEditor').style.display = (type === '圖片' ? 'block' : 'none');
        document.getElementById('textEditor').style.display = (type === '文字' ? 'block' : 'none');
    }

    function addTextRow() {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <input type="text" placeholder="內容" class="t-msg" style="flex:2">
            <input type="color" value="#333333" style="width:45px" class="t-col">
            <input type="number" value="16" style="width:55px" class="t-size">
            <select class="t-link-type" style="width:85px" onchange="toggleRowInput(this)">
                <option value="none">無連結</option>
                <option value="url">網址</option>
                <option value="email">信箱</option>
            </select>
            <input type="text" placeholder="https://... 或 email" class="t-link-val" style="display:none; flex:1">
            <button onclick="this.parentElement.remove()" style="width:35px; background:#ff4d4d; color:white; border:none; cursor:pointer;">X</button>`;
        document.getElementById('textRows').appendChild(row);
    }

    function toggleRowInput(sel) {
        sel.nextElementSibling.style.display = (sel.value === 'none' ? 'none' : 'block');
    }

    async function publishAd() {
        const gas = document.getElementById('gasUrl').value;
        if(!gas) return alert("❌ 請填寫 GAS 網址！");
        
        const type = document.getElementById('adType').value;
        let imageBlob = null;
        let content = "";

        if(type === '圖片') {
            const file = document.getElementById('fileIn').files[0];
            if(file) {
                imageBlob = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
        } else {
            document.querySelectorAll('#textRows .row').forEach(r => {
                const msg = r.querySelector('.t-msg').value;
                const col = r.querySelector('.t-col').value;
                const size = r.querySelector('.t-size').value;
                const lType = r.querySelector('.t-link-type').value;
                const lVal = r.querySelector('.t-link-val').value;

                if(msg) {
                    let style = `color:${col}; font-size:${size}px; display:block; margin-bottom:5px; text-decoration:none;`;
                    if(lType === 'none') {
                        content += `<span style="${style}">${msg}</span>`;
                    } else {
                        let href = (lType === 'email') ? `mailto:${lVal}` : lVal;
                        content += `<a href="${href}" target="_blank" style="${style}">${msg}</a>`;
                    }
                }
            });
        }

        const payload = {
            zone: document.getElementById('zoneId').value,
            type: type,
            content: content,
            link: document.getElementById('linkUrl').value,
            start: document.getElementById('startTime').value,
            end: document.getElementById('endTime').value,
            imageBlob: imageBlob
        };

        try {
            await fetch(gas, { method: 'POST', body: JSON.stringify(payload) });
            alert("✅ 廣告已成功發佈！");
        } catch (err) {
            alert("❌ 發佈失敗，請檢查 GAS 網址與 CORS 設定。");
        }
    }

    function genEmbed() {
        const zone = document.getElementById('zoneId').value || "ZONE_ID";
        const gas = document.getElementById('gasUrl').value || "GAS_URL";
        const js = document.getElementById('jsPath').value;
        const code = `<div id="ad-${zone}"></div>\n<script src="${js}"><\/script>\n<script>\n  initAd({ target: "ad-${zone}", zone: "${zone}", api: "${gas}?action=get" });\n<\/script>`;
        document.getElementById('embedOutput').innerText = code;
    }

    function copyEmbedCode() {
        navigator.clipboard.writeText(document.getElementById('embedOutput').innerText);
        alert("✅ 複製成功！");
    }

    addTextRow();
    genEmbed();
</script>
</body>
</html>
