<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>廣告投放控制台</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #007bff; }
        input, select, button { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .btn-pub { background: #007bff; color: #fff; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .code-res { background: #222; color: #0f0; padding: 15px; border-radius: 6px; font-family: monospace; white-space: pre-wrap; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🎯 廣告投放控制台</h2>
    <div class="section">
        <label>GAS 網址</label>
        <input type="text" id="gasUrl" placeholder="請貼上部署後的 /exec 網址">
    </div>
    <div class="section">
        <div class="row">
            <input type="text" id="zoneId" placeholder="區域 ID (例如: Top-01)" oninput="gen()">
            <select id="adType" onchange="st()">
                <option value="圖片">圖片 (Base64 版)</option>
                <option value="文字">純文字</option>
            </select>
        </div>
        <div class="row">
            <input type="datetime-local" id="sTime"><input type="datetime-local" id="eTime">
        </div>
        <div id="imgArea">
            <label>選擇圖片 (建議 < 200KB)</label><input type="file" id="fIn" accept="image/*">
            <input type="url" id="linkUrl" placeholder="點擊後的跳轉連結 (https://...)">
        </div>
    </div>
    <button class="btn-pub" onclick="pub()">確認發佈廣告</button>
    <div class="section">
        <label>嵌入語法</label>
        <input type="text" id="jsPath" value="https://wuchson.github.io/ad-loader.js" oninput="gen()">
        <div id="outCode" class="code-res"></div>
    </div>
</div>
<script>
    function st() { document.getElementById('imgArea').style.display = document.getElementById('adType').value === '圖片' ? 'block' : 'none'; }
    async function pub() {
        const gas = document.getElementById('gasUrl').value;
        if(!gas) return alert("請填寫 GAS 網址");
        const file = document.getElementById('fIn').files[0];
        let b64 = null;
        if(file) b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
        const data = { 
            zone: document.getElementById('zoneId').value, 
            type: document.getElementById('adType').value, 
            content: "", 
            link: document.getElementById('linkUrl').value, 
            start: document.getElementById('sTime').value, 
            end: document.getElementById('eTime').value, 
            imageBlob: b64 
        };
        fetch(gas, { method: 'POST', body: JSON.stringify(data) }).then(() => alert("發佈完成！"));
    }
    function gen() {
        const z = document.getElementById('zoneId').value || "ZONE";
        const g = document.getElementById('gasUrl').value || "GAS";
        const j = document.getElementById('jsPath').value;
        document.getElementById('outCode').innerText = `<div id="ad-${z}" style="max-width:100%; overflow:hidden;"></div>\n<script src="${j}"><\/script>\n<script>\ninitAd({ target: "ad-${z}", zone: "${z}", api: "${g}?action=get" });\n<\/script>`;
    }
</script>
</body>
</html>
